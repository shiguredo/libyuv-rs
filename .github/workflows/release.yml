name: Release

on:
  push:
    tags:
      - "*"

env:
  RUST_BACKTRACE: 1

jobs:
  github-release:
    name: "Create GitHub Release"
    timeout-minutes: 20
    runs-on: ubuntu-slim
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Get the version
        id: get_version
        run: echo "VERSION=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_OUTPUT

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ${{ contains(steps.get_version.outputs.VERSION, 'canary') }}; then
            gh release create ${{ steps.get_version.outputs.VERSION }} \
              --prerelease \
              --title "${{ steps.get_version.outputs.VERSION }}" \
              --notes "Release ${{ steps.get_version.outputs.VERSION }}"
          else
            gh release create ${{ steps.get_version.outputs.VERSION }} \
              --title "${{ steps.get_version.outputs.VERSION }}" \
              --notes "Release ${{ steps.get_version.outputs.VERSION }}"
          fi

  build-prebuilt:
    name: "Build prebuilt (${{ matrix.target }})"
    needs: github-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: ubuntu-24.04_x86_64
            os: ubuntu-24.04
            lib_name: libyuv.a
          - target: ubuntu-24.04_arm64
            os: ubuntu-24.04-arm
            lib_name: libyuv.a
          - target: ubuntu-22.04_x86_64
            os: ubuntu-22.04
            lib_name: libyuv.a
          - target: ubuntu-22.04_arm64
            os: ubuntu-22.04-arm
            lib_name: libyuv.a
          - target: macos_arm64
            os: macos-15
            lib_name: libyuv.a
          - target: windows_x86_64
            os: windows-2025
            lib_name: yuv.lib
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Build with source-build
        run: cargo build --release --features source-build

      - name: Find OUT_DIR
        id: find_out_dir
        shell: bash
        run: |
          OUT_DIR=$(find target/release/build/shiguredo_libyuv-*/out -maxdepth 0 -type d 2>/dev/null | head -1)
          echo "OUT_DIR=${OUT_DIR}" >> $GITHUB_OUTPUT

      - name: Create prebuilt archive
        shell: bash
        run: |
          mkdir -p staging/lib
          cp "${{ steps.find_out_dir.outputs.OUT_DIR }}/lib/${{ matrix.lib_name }}" staging/lib/
          cp "${{ steps.find_out_dir.outputs.OUT_DIR }}/bindings.rs" staging/
          tar czf libyuv-${{ matrix.target }}.tar.gz -C staging .

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          if command -v sha256sum &> /dev/null; then
            sha256sum libyuv-${{ matrix.target }}.tar.gz > libyuv-${{ matrix.target }}.tar.gz.sha256
          else
            shasum -a 256 libyuv-${{ matrix.target }}.tar.gz > libyuv-${{ matrix.target }}.tar.gz.sha256
          fi

      - name: Upload prebuilt archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload ${{ needs.github-release.outputs.version }} \
            libyuv-${{ matrix.target }}.tar.gz \
            libyuv-${{ matrix.target }}.tar.gz.sha256 \
            --clobber

  publish:
    needs: [github-release, build-prebuilt]
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v6
      - uses: rust-lang/crates-io-auth-action@v1
        id: auth
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  slack_notify:
    needs: [github-release, build-prebuilt, publish]
    timeout-minutes: 5
    runs-on: ubuntu-slim
    if: ${{ always() }}
    permissions:
      actions: read
    steps:
      - name: Slack Notification
        uses: shiguredo/github-actions/.github/actions/slack-notify@main
        with:
          status: ${{ job.status }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          slack_channel: rust-oss
          notify_mode: failure_and_fixed
