name: Release

on:
  push:
    tags:
      - "*"

env:
  RUST_BACKTRACE: 1

jobs:
  github-release:
    name: "Create GitHub Release"
    timeout-minutes: 20
    runs-on: ubuntu-slim
    outputs:
      version: ${{ steps.get_version.outputs.VERSION }}
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Get the version
        id: get_version
        run: echo "VERSION=${GITHUB_REF/refs\/tags\//}" >> $GITHUB_OUTPUT

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if ${{ contains(steps.get_version.outputs.VERSION, 'canary') }}; then
            gh release create ${{ steps.get_version.outputs.VERSION }} \
              --prerelease \
              --title "${{ steps.get_version.outputs.VERSION }}" \
              --notes "Release ${{ steps.get_version.outputs.VERSION }}"
          else
            gh release create ${{ steps.get_version.outputs.VERSION }} \
              --title "${{ steps.get_version.outputs.VERSION }}" \
              --notes "Release ${{ steps.get_version.outputs.VERSION }}"
          fi

  build-prebuilt:
    name: "Build prebuilt (${{ matrix.target }})"
    needs: github-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: ubuntu-24.04_x86_64
            os: ubuntu-24.04
            lib_name: libshiguredo_yuv.a
            jpeg_lib_name: libshiguredo_jpeg.a
          - target: ubuntu-24.04_arm64
            os: ubuntu-24.04-arm
            lib_name: libshiguredo_yuv.a
            jpeg_lib_name: libshiguredo_jpeg.a
          - target: ubuntu-22.04_x86_64
            os: ubuntu-22.04
            lib_name: libshiguredo_yuv.a
            jpeg_lib_name: libshiguredo_jpeg.a
          - target: ubuntu-22.04_arm64
            os: ubuntu-22.04-arm
            lib_name: libshiguredo_yuv.a
            jpeg_lib_name: libshiguredo_jpeg.a
          - target: macos_arm64
            os: macos-15
            lib_name: libshiguredo_yuv.a
            jpeg_lib_name: libshiguredo_jpeg.a
          - target: windows_x86_64
            os: windows-2025
            lib_name: shiguredo_yuv.lib
            jpeg_lib_name: shiguredo_jpeg.lib
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - name: Checkout sources
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install NASM
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)
              if [ "${{ runner.arch }}" = "X64" ]; then
                sudo apt-get update && sudo apt-get install -y nasm
              fi
              ;;
            macOS)   brew install nasm ;;
            Windows) choco install nasm -y && echo "C:\\Program Files\\NASM" >> $GITHUB_PATH ;;
          esac

      - name: Build with source-build
        run: cargo build --release --features source-build

      - name: Find OUT_DIR
        id: find_out_dir
        shell: bash
        run: |
          set -euo pipefail
          # ci.yml の Verify symbol rewrite と同じ空 glob ガードを適用する
          candidates=$(find target/release/build/shiguredo_libyuv-*/out -maxdepth 0 -type d 2>/dev/null || true)
          if [ -z "$candidates" ]; then
            echo "ERROR: no OUT_DIR matched target/release/build/shiguredo_libyuv-*/out"
            exit 1
          fi
          # BSD wc -l は先頭に空白を付ける ($'       1' 等) ため数値比較で評価する
          count=$(echo "$candidates" | wc -l)
          if [ "$count" -ne 1 ]; then
            echo "ERROR: expected 1 OUT_DIR but got $count:"
            echo "$candidates"
            exit 1
          fi
          OUT_DIR=$(echo "$candidates" | head -1)
          echo "OUT_DIR=${OUT_DIR}" >> $GITHUB_OUTPUT

      - name: Verify symbol rewrite
        shell: bash
        run: bash scripts/verify_symbol_rewrite.sh "${{ steps.find_out_dir.outputs.OUT_DIR }}"

      - name: Create prebuilt archive
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p staging/lib
          cp "${{ steps.find_out_dir.outputs.OUT_DIR }}/lib/${{ matrix.lib_name }}" staging/lib/
          cp "${{ steps.find_out_dir.outputs.OUT_DIR }}/lib/${{ matrix.jpeg_lib_name }}" staging/lib/
          cp "${{ steps.find_out_dir.outputs.OUT_DIR }}/bindings.rs" staging/
          cp LICENSE staging/
          cp THIRD_PARTY_LICENSES staging/
          tar czf libyuv-${{ matrix.target }}.tar.gz -C staging .

      - name: Verify archive contents
        shell: bash
        run: |
          set -euo pipefail
          # grep -q が早期終了すると tar が SIGPIPE を受けて pipefail で失敗扱いになるため
          # 一旦変数に格納してから検査する
          contents=$(tar tzf libyuv-${{ matrix.target }}.tar.gz)
          if ! echo "$contents" | grep -q "^\./THIRD_PARTY_LICENSES$"; then
            echo "ERROR: THIRD_PARTY_LICENSES missing from libyuv-${{ matrix.target }}.tar.gz"
            exit 1
          fi

      - name: Generate SHA256 checksum
        shell: bash
        run: |
          if command -v sha256sum &> /dev/null; then
            sha256sum libyuv-${{ matrix.target }}.tar.gz > libyuv-${{ matrix.target }}.tar.gz.sha256
          else
            shasum -a 256 libyuv-${{ matrix.target }}.tar.gz > libyuv-${{ matrix.target }}.tar.gz.sha256
          fi

      - name: Upload prebuilt archive
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          gh release upload ${{ needs.github-release.outputs.version }} \
            libyuv-${{ matrix.target }}.tar.gz \
            libyuv-${{ matrix.target }}.tar.gz.sha256 \
            --clobber

  publish:
    needs: [github-release, build-prebuilt]
    timeout-minutes: 10
    runs-on: ubuntu-24.04
    environment: release
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: rust-lang/crates-io-auth-action@bbd81622f20ce9e2dd9622e3218b975523e45bbe # v1.0.4
        id: auth
      - run: cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  slack_notify:
    needs: [github-release, build-prebuilt, publish]
    timeout-minutes: 5
    runs-on: ubuntu-slim
    if: ${{ always() }}
    permissions:
      actions: read
    steps:
      - name: Slack Notification
        uses: shiguredo/github-actions/.github/actions/slack-notify@main
        with:
          status: ${{ job.status }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          slack_channel: rust-oss
          notify_mode: failure_and_fixed
