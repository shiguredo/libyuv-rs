name: CI

on:
  workflow_dispatch:
  push:
    branches:
      - "develop"
      - "feature/**"
    tags-ignore:
      - "**"
    paths-ignore:
      - "**.md"

env:
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - ubuntu-24.04-arm
          - ubuntu-22.04
          - ubuntu-22.04-arm
          - macos-26
          - macos-15
          - windows-2025
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: rustup update stable
      - name: Install NASM
        shell: bash
        run: |
          case "${{ runner.os }}" in
            Linux)
              if [ "${{ runner.arch }}" = "X64" ]; then
                sudo apt-get update && sudo apt-get install -y nasm
              fi
              ;;
            macOS)   brew install nasm ;;
            Windows) choco install nasm -y && echo "C:\\Program Files\\NASM" >> $GITHUB_PATH ;;
          esac
      - name: Verify license hash
        shell: bash
        run: bash scripts/verify_license_hash.sh
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --features source-build -- -D warnings
      - run: cargo test --workspace --features source-build
      - name: Verify symbol rewrite
        shell: bash
        run: |
          set -euo pipefail
          # 空 glob 時に find が「No such file or directory」で非ゼロ終了するので
          # `|| true` で受け、候補が空のときは明示的にエラーにする。
          # cargo clippy と cargo test は profile が異なり metadata hash も変わるため、
          # `shiguredo_libyuv-<hash>/out` が複数できる場合がある。最新更新の 1 つを選ぶ。
          candidates=$(find target/debug/build/shiguredo_libyuv-*/out -maxdepth 0 -type d 2>/dev/null || true)
          if [ -z "$candidates" ]; then
            echo "ERROR: no OUT_DIR matched target/debug/build/shiguredo_libyuv-*/out"
            exit 1
          fi
          OUT_DIR=$(printf '%s\n' $candidates | xargs ls -td 2>/dev/null | head -1)
          if [ -z "$OUT_DIR" ] || [ ! -d "$OUT_DIR" ]; then
            echo "ERROR: failed to pick OUT_DIR from candidates:"
            echo "$candidates"
            exit 1
          fi
          echo "selected OUT_DIR=$OUT_DIR"
          bash scripts/verify_symbol_rewrite.sh "$OUT_DIR"
          bash scripts/verify_libyuv_source.sh "$OUT_DIR"

  # docs.rs 向けビルド確認
  docs-rs:
    name: docs.rs
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    env:
      DOCS_RS: 1
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - run: rustup update stable
      - run: cargo doc --no-deps

  slack_notify:
    needs:
      - test
      - docs-rs
    runs-on: ubuntu-slim
    if: always()
    timeout-minutes: 5
    permissions:
      actions: read
    steps:
      - name: Slack Notification
        uses: shiguredo/github-actions/.github/actions/slack-notify@main
        with:
          status: ${{ job.status }}
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}
          slack_channel: rust-oss
          notify_mode: failure_and_fixed
        env:
          GH_TOKEN: ${{ github.token }}
